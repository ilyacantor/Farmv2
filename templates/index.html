<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOS Farm Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Quicksand', sans-serif; }
        body { background-color: #0F172A; }
        .cyan-glow { box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
        .purple-glow { box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
        .status-pass { background: #065f46; border-color: #10b981; color: #6ee7b7; }
        .status-warn { background: #78350f; border-color: #f59e0b; color: #fcd34d; }
        .status-fail { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }
        .status-none { background: #1e293b; border-color: #475569; color: #94a3b8; }
        .aod-processed { background: #065f46; border-color: #10b981; color: #6ee7b7; }
        .aod-not-processed { background: #1e293b; border-color: #475569; color: #94a3b8; }
        .aod-error { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }
        .aod-loading { background: #1e293b; border-color: #475569; color: #64748b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8">
            <div class="flex items-center gap-3 mb-2">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                        AOS Farm
                    </h1>
                    <p class="text-slate-400 text-sm">Did AOD get it right?</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-800/60 rounded-xl p-6 border border-slate-700">
                    <h2 class="text-xl font-semibold text-cyan-400 mb-4">Generate Snapshot</h2>
                    
                    <form id="snapshotForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Tenant ID</label>
                            <input type="text" id="tenantId" value="Acme Corp" 
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Seed</label>
                            <input type="number" id="seed" value="12345" 
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Scale</label>
                            <select id="scale" 
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
                                <option value="small">Small</option>
                                <option value="medium" selected>Medium</option>
                                <option value="large">Large</option>
                                <option value="enterprise">Enterprise</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Enterprise Profile</label>
                            <select id="enterpriseProfile" 
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
                                <option value="modern_saas" selected>Modern SaaS</option>
                                <option value="regulated_finance">Regulated Finance</option>
                                <option value="healthcare_provider">Healthcare Provider</option>
                                <option value="global_manufacturing">Global Manufacturing</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Realism Profile</label>
                            <select id="realismProfile" 
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
                                <option value="clean">Clean</option>
                                <option value="typical" selected>Typical</option>
                                <option value="messy">Messy</option>
                            </select>
                        </div>
                        
                        <button type="submit" id="generateBtn"
                            class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 cyan-glow">
                            Generate Snapshot
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-800/60 rounded-xl p-6 border border-slate-700">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-semibold text-purple-400 flex items-center gap-2">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            Reconciliation Status
                        </h2>
                        <div class="flex gap-2 text-xs">
                            <span class="px-2 py-1 rounded border status-pass">PASS</span>
                            <span class="px-2 py-1 rounded border status-warn">WARN</span>
                            <span class="px-2 py-1 rounded border status-fail">FAIL</span>
                            <span class="px-2 py-1 rounded border status-none">Not Run</span>
                        </div>
                    </div>
                    
                    <div id="snapshotsList" class="space-y-3 max-h-[600px] overflow-y-auto">
                        <div class="text-slate-500 text-center py-8">Loading snapshots...</div>
                    </div>
                    <p id="noSnapshots" class="hidden text-slate-500 text-center py-8">
                        No snapshots yet. Generate one to get started.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay hidden">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 w-full max-w-4xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-cyan-400">Snapshot Details</h3>
                <button id="closeDetailBtn" class="text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <div id="reconcileModal" class="modal-overlay hidden">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 w-full max-w-lg mx-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-purple-400">Reconcile with AOD</h3>
                <button id="closeReconcileBtn" class="text-slate-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div id="autoReconcileSection" class="mb-4">
                <input type="hidden" id="autoReconcileSnapshotId">
                <input type="hidden" id="autoReconcileTenantId">
                
                <div id="autoReconcileError" class="hidden bg-red-900/40 border border-red-700 text-red-300 px-4 py-3 rounded-lg mb-4 text-sm"></div>
                <div id="autoReconcileSuccess" class="hidden bg-green-900/40 border border-green-700 text-green-300 px-4 py-3 rounded-lg mb-4">
                    <div class="font-medium mb-1">Reconciliation Complete</div>
                    <div id="autoReconcileResult" class="text-sm"></div>
                </div>
                
                <button id="autoReconcileBtn" onclick="runAutoReconcile()"
                    class="w-full bg-purple-600 hover:bg-purple-500 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 purple-glow mb-4">
                    Reconcile (Latest AOD Run)
                </button>
            </div>
            
            <details class="mb-4">
                <summary class="text-slate-300 cursor-pointer hover:text-white font-medium">Advanced: Manual Entry</summary>
                <form id="reconcileForm" class="space-y-4 mt-4">
                    <input type="hidden" id="reconcileSnapshotId">
                    <input type="hidden" id="reconcileTenantId">
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">AOD Run ID</label>
                        <input type="text" id="aodRunId" placeholder="e.g., aod-run-2024-001" required
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Assets Admitted</label>
                            <input type="number" id="aodAssetsAdmitted" value="0" min="0"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Findings</label>
                            <input type="number" id="aodFindings" value="0" min="0"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Zombies Detected</label>
                            <input type="number" id="aodZombies" value="0" min="0"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Shadows Detected</label>
                            <input type="number" id="aodShadows" value="0" min="0"
                                class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Zombie Asset Keys (comma-separated)</label>
                        <input type="text" id="aodZombieAssets" placeholder="e.g., oldapp, legacydb"
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1">Shadow Asset Keys (comma-separated)</label>
                        <input type="text" id="aodShadowAssets" placeholder="e.g., newapp, shadowsaas"
                            class="w-full bg-slate-900/60 border border-slate-700 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none">
                    </div>
                    
                    <div id="reconcileModalError" class="hidden bg-red-900/40 border border-red-700 text-red-300 px-4 py-3 rounded-lg text-sm"></div>
                    
                    <button type="submit" id="submitReconcileBtn"
                        class="w-full bg-purple-600 hover:bg-purple-500 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 purple-glow">
                        Run Reconciliation
                    </button>
                </form>
            </details>
        </div>
    </div>

    <script>
        let snapshotsCache = [];
        let reconciliationsCache = {};
        let aodStatusCache = {};

        function getStatusBadge(status, size = 'normal') {
            const classes = {
                'PASS': 'status-pass',
                'WARN': 'status-warn',
                'FAIL': 'status-fail',
                'NOT_RUN': 'status-none'
            };
            const sizeClass = size === 'large' ? 'px-3 py-1.5 text-sm' : 'px-2 py-1 text-xs';
            const label = status === 'NOT_RUN' ? 'Not Run' : status;
            return `<span class="${sizeClass} rounded font-semibold border ${classes[status] || classes['NOT_RUN']}">${label}</span>`;
        }

        function getAodStatusBadge(aodStatus) {
            if (!aodStatus) {
                return `<span class="px-2 py-0.5 rounded text-xs font-medium border aod-loading">AOD: ...</span>`;
            }
            const classes = {
                'PROCESSED': 'aod-processed',
                'NOT_PROCESSED': 'aod-not-processed',
                'AOD_ERROR': 'aod-error'
            };
            const labels = {
                'PROCESSED': 'AOD Ready',
                'NOT_PROCESSED': 'Not in AOD',
                'AOD_ERROR': 'AOD Error'
            };
            return `<span class="px-2 py-0.5 rounded text-xs font-medium border ${classes[aodStatus.status] || 'aod-not-processed'}">${labels[aodStatus.status] || aodStatus.status}</span>`;
        }

        async function fetchAodStatus(snapshotId, tenantId) {
            try {
                const resp = await fetch(`/api/aod/run-status?snapshot_id=${encodeURIComponent(snapshotId)}&tenant_id=${encodeURIComponent(tenantId)}`);
                if (resp.ok) {
                    return await resp.json();
                }
                return { status: 'AOD_ERROR', message: `HTTP ${resp.status}` };
            } catch (e) {
                return { status: 'AOD_ERROR', message: e.message };
            }
        }

        async function loadAodStatuses() {
            const promises = snapshotsCache.map(async (snap) => {
                const status = await fetchAodStatus(snap.snapshot_id, snap.tenant_id);
                aodStatusCache[snap.snapshot_id] = status;
            });
            await Promise.all(promises);
            renderSnapshotsList();
        }

        async function loadAllData() {
            try {
                const [snapshotsRes, reconciliationsRes] = await Promise.all([
                    fetch('/api/snapshots?limit=100'),
                    fetch('/api/reconcile?limit=500')
                ]);
                
                snapshotsCache = await snapshotsRes.json();
                const allReconciliations = await reconciliationsRes.json();
                
                reconciliationsCache = {};
                for (const rec of allReconciliations) {
                    if (!reconciliationsCache[rec.snapshot_id]) {
                        reconciliationsCache[rec.snapshot_id] = [];
                    }
                    reconciliationsCache[rec.snapshot_id].push(rec);
                }
                
                snapshotsCache.sort((a, b) => {
                    const recA = reconciliationsCache[a.snapshot_id]?.[0];
                    const recB = reconciliationsCache[b.snapshot_id]?.[0];
                    const timeA = recA ? new Date(recA.created_at) : new Date(0);
                    const timeB = recB ? new Date(recB.created_at) : new Date(0);
                    if (recA && recB) return timeB - timeA;
                    if (recA && !recB) return -1;
                    if (!recA && recB) return 1;
                    return new Date(b.created_at) - new Date(a.created_at);
                });
                renderSnapshotsList();
                loadAodStatuses();
            } catch (e) {
                console.error('Failed to load data:', e);
                document.getElementById('snapshotsList').innerHTML = 
                    '<div class="text-red-400 text-center py-8">Failed to load data. Check console.</div>';
            }
        }

        function getLatestReconciliation(snapshotId) {
            const recs = reconciliationsCache[snapshotId];
            if (!recs || recs.length === 0) return null;
            return recs[0];
        }

        function renderSnapshotsList() {
            const container = document.getElementById('snapshotsList');
            const noSnapshots = document.getElementById('noSnapshots');
            
            if (snapshotsCache.length === 0) {
                container.innerHTML = '';
                noSnapshots.classList.remove('hidden');
                return;
            }
            
            noSnapshots.classList.add('hidden');
            
            container.innerHTML = snapshotsCache.map(snap => {
                const rec = getLatestReconciliation(snap.snapshot_id);
                const status = rec ? rec.status : 'NOT_RUN';
                const aodStatus = aodStatusCache[snap.snapshot_id];
                const canReconcile = aodStatus && aodStatus.status === 'PROCESSED';
                
                const recInfo = rec ? 
                    `<div class="text-xs text-slate-400 mt-1">AOD Run: ${rec.aod_run_id} | ${new Date(rec.created_at).toLocaleString('en-US', {timeZone: 'America/Los_Angeles', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true})} PST</div>` :
                    (aodStatus && aodStatus.status === 'NOT_PROCESSED' ?
                        `<div class="text-xs text-amber-500 mt-1">Run AOD on this snapshot first</div>` :
                        `<div class="text-xs text-slate-500 mt-1">No reconciliation performed yet</div>`);
                
                const reconcileButton = canReconcile ? `
                    <button onclick="openReconcileModal('${snap.snapshot_id}', '${snap.tenant_id}')" 
                        class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-medium py-1.5 px-3 rounded transition-all duration-200">
                        Reconcile
                    </button>
                ` : (aodStatus && aodStatus.status === 'NOT_PROCESSED' ? `
                    <button disabled title="Run AOD on this snapshot first"
                        class="bg-slate-700 text-slate-500 text-xs font-medium py-1.5 px-3 rounded cursor-not-allowed">
                        Reconcile
                    </button>
                ` : '');
                
                return `
                    <div class="bg-slate-900/60 rounded-lg p-4 border border-slate-700 hover:border-purple-500/50 transition-colors">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-3 mb-1">
                                    ${getStatusBadge(status, 'large')}
                                    ${getAodStatusBadge(aodStatus)}
                                    <span class="text-cyan-400 font-semibold truncate">${snap.tenant_id}</span>
                                </div>
                                <div class="text-sm text-slate-400">
                                    Seed: ${snap.seed} | ${snap.scale} | ${snap.enterprise_profile}
                                </div>
                                ${recInfo}
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <div class="text-xs text-slate-500">${new Date(snap.created_at).toLocaleString('en-US', {timeZone: 'America/Los_Angeles', month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true})} PST</div>
                                <div class="flex gap-2">
                                    ${!rec ? reconcileButton : ''}
                                    <button onclick="openDetailModal('${snap.snapshot_id}')" 
                                        class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium py-1.5 px-3 rounded transition-all duration-200">
                                        Details
                                    </button>
                                </div>
                            </div>
                        </div>
                        ${rec ? renderReconciliationSummary(rec) : ''}
                    </div>
                `;
            }).join('');
        }

        function renderReconciliationSummary(rec) {
            const lines = (rec.report_text || '').split('\n').filter(l => l.trim());
            const headline = lines.find(l => l.includes('RESULT:')) || lines[0] || '';
            
            return `
                <div class="mt-3 pt-3 border-t border-slate-700">
                    <div class="text-sm text-slate-300">${headline}</div>
                    <details class="mt-2">
                        <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-400">View full report</summary>
                        <div class="mt-2 bg-slate-800/60 rounded p-3 text-xs text-slate-400 whitespace-pre-line">
${rec.report_text || 'No report available'}
                        </div>
                    </details>
                </div>
            `;
        }

        async function openDetailModal(snapshotId) {
            try {
                const response = await fetch(`/api/snapshots/${snapshotId}`);
                const snapshot = await response.json();
                
                const meta = snapshot.meta;
                const counts = meta.counts;
                const recs = reconciliationsCache[snapshotId] || [];
                
                document.getElementById('detailContent').innerHTML = `
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                            <div><span class="text-slate-400">Tenant:</span> <span class="text-white">${meta.tenant_id}</span></div>
                            <div><span class="text-slate-400">Seed:</span> <span class="text-white">${meta.seed}</span></div>
                            <div><span class="text-slate-400">Scale:</span> <span class="text-white">${meta.scale}</span></div>
                            <div><span class="text-slate-400">Fingerprint:</span> <span class="text-white font-mono">${snapshot.meta.snapshot_fingerprint || 'N/A'}</span></div>
                        </div>
                        
                        <div>
                            <h4 class="text-purple-400 font-medium mb-2">Reconciliation History (${recs.length})</h4>
                            ${recs.length === 0 ? 
                                '<div class="text-slate-500 text-sm">No reconciliations yet.</div>' :
                                recs.map(r => `
                                    <div class="bg-slate-900/60 rounded-lg p-3 border border-slate-700 mb-2">
                                        <div class="flex items-center justify-between mb-2">
                                            ${getStatusBadge(r.status)}
                                            <span class="text-xs text-slate-500">${new Date(r.created_at).toLocaleString()}</span>
                                        </div>
                                        <div class="text-sm text-slate-400">AOD Run: ${r.aod_run_id}</div>
                                        <div class="text-xs text-slate-500 whitespace-pre-line mt-2">${r.report_text || ''}</div>
                                    </div>
                                `).join('')
                            }
                        </div>
                        
                        <div>
                            <h4 class="text-cyan-400 font-medium mb-2">Data Counts</h4>
                            <div class="grid grid-cols-3 md:grid-cols-4 gap-2 text-xs">
                                ${Object.entries(counts).map(([k, v]) => `
                                    <div class="bg-slate-900/60 rounded p-2">
                                        <div class="text-cyan-400 font-bold">${v}</div>
                                        <div class="text-slate-500">${k.replace(/_/g, ' ')}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="flex gap-2">
                            <button onclick="downloadSnapshot('${snapshotId}')" 
                                class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium py-2 px-4 rounded transition-all duration-200">
                                Download JSON
                            </button>
                            <button onclick="document.getElementById('detailModal').classList.add('hidden'); openReconcileModal('${snapshotId}', '${meta.tenant_id}')" 
                                class="bg-purple-600 hover:bg-purple-500 text-white text-sm font-medium py-2 px-4 rounded transition-all duration-200">
                                New Reconciliation
                            </button>
                        </div>
                    </div>
                `;
                
                document.getElementById('detailModal').classList.remove('hidden');
            } catch (e) {
                console.error('Failed to load snapshot:', e);
            }
        }

        async function downloadSnapshot(snapshotId) {
            try {
                const response = await fetch(`/api/snapshots/${snapshotId}`);
                const snapshot = await response.json();
                const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `snapshot-${snapshotId}.json`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error('Failed to download:', e);
            }
        }

        function openReconcileModal(snapshotId, tenantId) {
            document.getElementById('reconcileSnapshotId').value = snapshotId;
            document.getElementById('reconcileTenantId').value = tenantId;
            document.getElementById('autoReconcileSnapshotId').value = snapshotId;
            document.getElementById('autoReconcileTenantId').value = tenantId;
            document.getElementById('reconcileModal').classList.remove('hidden');
            document.getElementById('reconcileModalError').classList.add('hidden');
            document.getElementById('autoReconcileError').classList.add('hidden');
            document.getElementById('autoReconcileSuccess').classList.add('hidden');
            
            const aodStatus = aodStatusCache[snapshotId];
            const btn = document.getElementById('autoReconcileBtn');
            const errorDiv = document.getElementById('autoReconcileError');
            
            if (aodStatus && aodStatus.status === 'NOT_PROCESSED') {
                btn.disabled = true;
                btn.textContent = 'AOD has not processed this snapshot';
                btn.classList.remove('bg-purple-600', 'hover:bg-purple-500', 'purple-glow');
                btn.classList.add('bg-slate-700', 'text-slate-500', 'cursor-not-allowed');
                errorDiv.textContent = 'Run AOD on this snapshot first, then you can reconcile.';
                errorDiv.classList.remove('hidden');
            } else if (aodStatus && aodStatus.status === 'AOD_ERROR') {
                btn.disabled = true;
                btn.textContent = 'AOD unavailable';
                btn.classList.remove('bg-purple-600', 'hover:bg-purple-500', 'purple-glow');
                btn.classList.add('bg-slate-700', 'text-slate-500', 'cursor-not-allowed');
                errorDiv.textContent = aodStatus.message || 'Cannot connect to AOD';
                errorDiv.classList.remove('hidden');
            } else {
                btn.disabled = false;
                btn.textContent = 'Reconcile (Latest AOD Run)';
                btn.classList.add('bg-purple-600', 'hover:bg-purple-500', 'purple-glow');
                btn.classList.remove('bg-slate-700', 'text-slate-500', 'cursor-not-allowed');
            }
        }

        async function runAutoReconcile() {
            const btn = document.getElementById('autoReconcileBtn');
            const errorDiv = document.getElementById('autoReconcileError');
            const successDiv = document.getElementById('autoReconcileSuccess');
            const resultDiv = document.getElementById('autoReconcileResult');
            
            const snapshotId = document.getElementById('autoReconcileSnapshotId').value;
            const tenantId = document.getElementById('autoReconcileTenantId').value;
            
            btn.disabled = true;
            btn.textContent = 'Reconciling...';
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/reconcile/auto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ snapshot_id: snapshotId, tenant_id: tenantId })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    const errorMsg = data.detail || 'Unknown error occurred';
                    errorDiv.textContent = errorMsg;
                    errorDiv.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Reconcile (Latest AOD Run)';
                    return;
                }
                
                const headline = (data.report_text || '').split('\n').find(l => l.includes('RESULT:')) || data.report_text?.split('\n')[0] || '';
                resultDiv.innerHTML = `
                    <div class="mb-2">${getStatusBadge(data.status, 'large')}</div>
                    <div>${headline}</div>
                    <div class="text-xs mt-1">AOD Run: ${data.aod_run_id}</div>
                `;
                successDiv.classList.remove('hidden');
                
                await loadAllData();
                
                setTimeout(() => {
                    document.getElementById('reconcileModal').classList.add('hidden');
                }, 2000);
                
            } catch (e) {
                console.error('Auto reconcile failed:', e);
                errorDiv.textContent = 'Network error: Could not reach Farm server';
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Reconcile (Latest AOD Run)';
            }
        }

        document.getElementById('closeDetailBtn').addEventListener('click', () => {
            document.getElementById('detailModal').classList.add('hidden');
        });

        document.getElementById('closeReconcileBtn').addEventListener('click', () => {
            document.getElementById('reconcileModal').classList.add('hidden');
        });

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') {
                document.getElementById('detailModal').classList.add('hidden');
            }
        });

        document.getElementById('reconcileModal').addEventListener('click', (e) => {
            if (e.target.id === 'reconcileModal') {
                document.getElementById('reconcileModal').classList.add('hidden');
            }
        });

        document.getElementById('snapshotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            try {
                await fetch('/api/snapshots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tenant_id: document.getElementById('tenantId').value,
                        seed: parseInt(document.getElementById('seed').value),
                        scale: document.getElementById('scale').value,
                        enterprise_profile: document.getElementById('enterpriseProfile').value,
                        realism_profile: document.getElementById('realismProfile').value,
                    })
                });
                
                await loadAllData();
            } catch (e) {
                console.error('Failed to generate snapshot:', e);
                alert('Failed to generate snapshot. Check console for details.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Snapshot';
            }
        });

        document.getElementById('reconcileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitReconcileBtn');
            const errorDiv = document.getElementById('reconcileModalError');
            btn.disabled = true;
            btn.textContent = 'Running...';
            errorDiv.classList.add('hidden');
            
            try {
                const snapshotId = document.getElementById('reconcileSnapshotId').value;
                const tenantId = document.getElementById('reconcileTenantId').value;
                
                const zombieAssets = document.getElementById('aodZombieAssets').value
                    .split(',').map(s => s.trim()).filter(s => s);
                const shadowAssets = document.getElementById('aodShadowAssets').value
                    .split(',').map(s => s.trim()).filter(s => s);
                
                const response = await fetch('/api/reconcile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        snapshot_id: snapshotId,
                        aod_run_id: document.getElementById('aodRunId').value,
                        tenant_id: tenantId,
                        aod_summary: {
                            assets_admitted: parseInt(document.getElementById('aodAssetsAdmitted').value) || 0,
                            findings: parseInt(document.getElementById('aodFindings').value) || 0,
                            zombies: parseInt(document.getElementById('aodZombies').value) || 0,
                            shadows: parseInt(document.getElementById('aodShadows').value) || 0,
                        },
                        aod_lists: {
                            zombie_assets: zombieAssets,
                            shadow_assets: shadowAssets,
                            top_findings: [],
                        }
                    })
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Reconciliation failed');
                }
                
                document.getElementById('reconcileModal').classList.add('hidden');
                document.getElementById('reconcileForm').reset();
                await loadAllData();
                
            } catch (e) {
                console.error('Failed to reconcile:', e);
                errorDiv.textContent = e.message || 'Reconciliation failed';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Run Reconciliation';
            }
        });

        loadAllData();
    </script>
</body>
</html>
