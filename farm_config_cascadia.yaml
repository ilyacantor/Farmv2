      type: CRM
      domain: customer
    - name: "Oracle EBS R12"
      vendor: oracle.com
      type: ERP
      domain: financial
    - name: "BambooHR"
      vendor: bamboohr.com
      type: HCM
      domain: employee
    - name: "ServiceNow"
