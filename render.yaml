# Render Blueprint for AOS-Farm
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aos-farm-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        value: https://fdqldiqmskdihefzjalf.supabase.co
      - key: SUPABASE_KEY
        sync: false  # Set this manually in Render dashboard for security
      - key: FARM_PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: DEV_MODE
        value: false
      - key: CORS_ORIGINS
        value: '["*"]'
    healthCheckPath: /health
